<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Course — Smart Study Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <img src="Logo.png" alt="Brain Route Logo">
      </div>
      <div class="logo-text">
        Brain Route
        <small>Planner</small>
      </div>
    </div>

    <a class="nav-item" href="dashboard.html">Dashboard</a>
    <a class="nav-item active" href="courses.html">Courses</a>
    <a class="nav-item" href="deadlines.html">Deadlines</a>
    <a class="nav-item" href="study-plan.html">Study Plan</a>
    <a class="nav-item" href="progress.html">Progress</a>
    <a class="nav-item" href="reminders.html">Reminders</a>

    <div class="sidebar-user">
      <div class="user-avatar">S</div>
      <div class="user-details">
        <div class="user-name">Student</div>
        <div class="user-status">Logged in</div>
      </div>
    </div>

    <a class="nav-item logout" href="index.html">Log Out</a>
  </div>

  <!-- Main Area -->
  <div class="main-area">

    <div class="page-header">
      <h2>Edit Course</h2>
      <div class="user-avatar-header">S</div>
    </div>

    <div class="page-content">

      <!-- Edit Course Form -->
      <div class="widget">
        <div class="widget-header">
          <h3>Edit Course Details</h3>
          <span class="status-badge badge-lavender">CS101</span>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="course-code">COURSE CODE</label>
            <input type="text" id="course-code" name="course-code" value="CS101">
          </div>
          <div class="form-field">
            <label for="course-name">COURSE NAME</label>
            <input type="text" id="course-name" name="course-name" value="Introduction to JAVA">
          </div>
        </div>

        <div class="form-group">
          <label>STUDY DAYS</label>
          <div class="days-grid">

            <input type="checkbox" id="day-sun" class="day-toggle" hidden>
            <label for="day-sun" class="day-pill">Sun</label>

            <input type="checkbox" id="day-mon" class="day-toggle" checked hidden>
            <label for="day-mon" class="day-pill">Mon</label>

            <input type="checkbox" id="day-tue" class="day-toggle" hidden>
            <label for="day-tue" class="day-pill">Tue</label>

            <input type="checkbox" id="day-wed" class="day-toggle" checked hidden>
            <label for="day-wed" class="day-pill">Wed</label>

            <input type="checkbox" id="day-thu" class="day-toggle" hidden>
            <label for="day-thu" class="day-pill">Thu</label>

          </div>
        </div>

        <div class="form-actions">
          <a href="courses.html" class="button button-warning">Save Changes</a>
          <a href="courses.html" class="button button-secondary">Cancel</a>
        </div>

      </div>

    </div>
  </div>
</div>

</body>
</html>
